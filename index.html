<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi primera pagina </title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #D1ABE0, #CDCFF7, #F5C9F3);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 50px;
      font-weight: 600;
    }

    p {
      font-size: 20px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #764ba2;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Bienvenido a mi pagina</h1>
    <p>Hola mi amor, aqui ando haciendo paginas web y mientras estudio, 
    pienso en lo mucho que te amo, en lo mucho que debo cambiar mis actitudes por amor a nosotros dos
    TE AMO MI CIELITO👩🏻‍❤️‍💋‍👨🏼​💗​</p>
    <button class="btn">Explorar</button>
  </div>
</body>
</html>
