<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hola Caro este es un codigo donde puedas decir si voy bien o mal</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #D1ABE0, #CDCFF7, #F5C9F3);
      color: white;
      text-align: center;
      margin: 0;
    }

    .container {
      margin-top: 80px;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      cursor: pointer;
      margin-left: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 30px;
    }

    li {
      background: rgba(255,255,255,0.1);
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📝 Mi Mini App</h1>

  <input type="text" id="tarea" placeholder="Escribe una tarea">
  <button onclick="agregarTarea()">Agregar</button>

  <ul id="lista"></ul>
</div>

<script>
function agregarTarea() {
  const input = document.getElementById("tarea");
  const texto = input.value;

  if (texto === "") return;

  const li = document.createElement("li");
  li.innerHTML = texto + ' <button class="delete" onclick="eliminar(this)">X</button>';

  document.getElementById("lista").appendChild(li);

  input.value = "";
}

function eliminar(boton) {
  boton.parentElement.remove();
}
</script>

</body>
</html>
